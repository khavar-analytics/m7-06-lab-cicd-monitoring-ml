name: Deploy Model Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint OpenAPI spec & Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.5 lint openapi.yaml

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  test:
    name: Unit & Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: ./scripts/test-unit.sh

      - name: Run contract tests
        run: ./scripts/test-contract.sh 

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ${{ steps.vars.outputs.image_tag }} . 

  scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild image for scan
        run: docker build -t ${{ needs.build.outputs.image_tag }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.build.outputs.image_tag }}
          severity: HIGH,CRITICAL
          exit-code: '1'

  push:
    name: Push Image to GHCR
    runs-on: ubuntu-latest
    needs: [build, scan]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild image for push
        run: docker build -t ${{ needs.build.outputs.image_tag }} .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ${{ needs.build.outputs.image_tag }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: ./scripts/deploy.sh staging ${{ needs.build.outputs.image_tag }}

  smoke-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke test
        run: ./scripts/smoke.sh staging


  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Canary rollout (10%)
        run: ./scripts/deploy.sh production ${{ needs.build.outputs.image_tag }} --canary --weight=10

      - name: Verify canary
        run: ./scripts/canary-verify.sh production

      - name: Promote to full rollout
        run: ./scripts/deploy.sh production ${{ needs.build.outputs.image_tag }} --weight=100

      - name: Rollback on failure
        if: failure()
        run: ./scripts/rollback.sh production


